services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      SQLITE_PATH: /data/tanscope.sqlite3
      WATCH_ARCHIVE_PATH: /data/watch-archive.sqlite
      COOKIES_FILE: /cookies/cookies.txt
    volumes:
      - botdata:/data
      - ./cookies:/cookies:ro
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  botdata:
